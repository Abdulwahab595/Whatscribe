buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 24
        compileSdkVersion = 35
        targetSdkVersion = 35
        ndkVersion = "26.1.10909125"
        kotlinVersion = "1.9.24"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}



apply plugin: "com.facebook.react.rootproject"

subprojects { project ->
    project.buildDir = "C:/b/${project.name}"
    // Use lazy configuration to avoid 'already evaluated' errors
    project.plugins.whenPluginAdded { plugin ->
        if (plugin instanceof com.android.build.gradle.AppPlugin || plugin instanceof com.android.build.gradle.LibraryPlugin) {
            project.android {
                externalNativeBuild {
                    cmake {
                        buildStagingDirectory = "C:/c/Whatscribe/${project.name}"
                    }
                }
            }
        }
    }
}
